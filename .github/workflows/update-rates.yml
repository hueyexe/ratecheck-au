name: Update Mortgage Rates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: aggregator/go.sum

      - name: Lint aggregator
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9
          working-directory: aggregator

      - name: Run aggregator
        working-directory: aggregator
        run: go run .

      - name: Commit updated rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/rates.db public/analytics.json public/meta.json history.db
          if ! git diff --cached --quiet; then
            git commit -m "chore: update mortgage rates [skip ci]"
            git push
          else
            echo "No rate changes detected"
          fi
